<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio: Producto usando sumas </title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .exercise-container {
            margin-top: 50px;
            margin-bottom: 50px;
            background: white;
            padding: 30px;

        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 exercise-container">
                
                <h2 class="text-center mb-4 text-primary">Producto usando sumas </h2>
                
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Ejercicio3:</h5>
                        <p class="card-text">
                           Leer dos números y realizar el producto mediante sumas.
                        </p>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button onclick="ejecutarEjercicio()" class="btn btn-dark">Ejecutar Programa</button>
                </div>

                <div id="resultado">Los resultados aparecerán aquí</div>

                <div class="text-center">

                        &larr; Volver al Índice de Ejercicios

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function ejecutarEjercicio() {
            let salida;
            let numero1 = prompt("Ingresa un número");
            let numero2 = prompt("Ingresa otro número");
            if (numero1 !== null && numero2 !== null) {
                numero1 = parseInt(numero1);
                numero2 = parseInt(numero2);
                if (!isNaN(numero1) && !isNaN(numero2)) {
                    let suma = 0 ; 
                    for (let i = 1; i <=numero2;i++){
                        suma += numero1

                    }
                    salida= numero1+ " x "+ numero2 + " = " +numero1*numero2;
                } else {
                    salida = "Por favor, ingresa números válidos.";
                }
            }
            // --- FIN DE TU LÓGICA ---

            document.getElementById("resultado").innerText = salida;
        }
    </script>
</body>
</html>
