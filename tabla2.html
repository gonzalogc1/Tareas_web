<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primeros javaScript</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/estilos.css" />
 
  </head>
  <body>
    <div class="container">
      <div class="contenedor">
       <h1>Tabla de Multiplicar</h1>
        <table class="table table-striped contenedor">
          <thead>
            <tr>Tablas de multiplicar</tr>
          </thead>
          <tbody>
            <script type="text/javascript">
                let i = 1;
                let j = 1;
              do {
                document.write("<tr>");
                j = 1;
                do {
                  document.write("<td>"+ i*j+"</td>");
                    j++;
                }while (j <= 10);
                document.write("</tr>");
                i++;
              }while (i <= 10);
            </script>
          </tbody>

        </table>
      </div>
    </div>
  </body>
  <footer>
    <a href="index.html" class="btn btn-dark btn-sm w-100">Regresar</a></td>
</footer>
