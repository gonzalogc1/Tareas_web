<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio: Mayor de un arreglo</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
      }
      .exercise-container {
        margin-top: 50px;
        margin-bottom: 50px;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .btn-back {
        margin-top: 20px;
      }
      #resultado {
        background-color: #e9ecef;
        padding: 15px;
        border-radius: 5px;
        min-height: 50px;
        margin-top: 20px;
        white-space: pre-wrap; /* Mantiene saltos de línea del JS */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 exercise-container">
          <h2 class="text-center mb-4 text-primary">Mayor de un arreglo</h2>

          <div class="card mb-4">
            <div class="card-body">
              <h5 class="card-title">Ejercicio4:</h5>
              <p class="card-text">
                Leer una secuencia de n números, almacenarlos en un arreglo y
                mostrar la posición donde se encuentra el mayor valor leído.
              </p>
            </div>
          </div>

          <div class="d-grid gap-2">
            <button onclick="ejecutarEjercicio()" class="btn btn-dark">
              Ejecutar Programa
            </button>
          </div>

          <div id="resultado">Los resultados aparecerán aquí</div>

          <hr />

          <div class="text-center">
            <a href="indext.html" class="btn btn-outline-secondary btn-back">
              &larr; Volver al Índice de Ejercicios
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function ejecutarEjercicio() {
        let salida;
        let numero1;
        let arreglo = [];
        do {
          let entrada = prompt( "Ingrese un número para agregar o pulse cancelar/espacio para parar");
          if (entrada === null || entrada.trim() === "") break;
          numero1 = parseInt(entrada);
          if (!isNaN(numero1) && numero1 > 0) {
            arreglo.push(numero1);
          }
        } while (!(isNaN(numero1) || numero1 === null || numero1 <= 0));
        let mayor = arreglo[0];
        for (i = 1; i < arreglo.length; i++) {
          if (arreglo[i] > mayor) {
            mayor = arreglo[i];
          }
        }
        salida =
          "Del siguiente arreglo" + arreglo + "el numero mayor es : " + mayor;
        document.getElementById("resultado").innerText = salida;
      }
    </script>
  </body>
</html>
