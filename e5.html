<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio 5 : Suma de arreglos</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
      }
      .exercise-container {
        margin-top: 50px;
        margin-bottom: 50px;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .btn-back {
        margin-top: 20px;
      }
      #resultado {
        background-color: #e9ecef;
        padding: 15px;
        border-radius: 5px;
        min-height: 50px;
        margin-top: 20px;
        white-space: pre-wrap; /* Mantiene saltos de línea del JS */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 exercise-container">
          <h2 class="text-center mb-4 text-primary">Suma de arreglos</h2>

          <div class="card mb-4">
            <div class="card-body">
              <h5 class="card-title">Ejercicio 5:</h5>
              <p class="card-text">
                Leer una secuencia de n números, almacenarlos en un arreglo y
                mostrar la posición donde se encuentra el mayor valor leído.
              </p>
            </div>
          </div>

          <div class="d-grid gap-2">
            <button onclick="ejecutarEjercicio()" class="btn btn-dark">
              Ejecutar Programa
            </button>
          </div>

          <div id="resultado">Los resultados aparecerán aquí</div>

          <hr />

          <div class="text-center">
            <a href="indext.html" class="btn btn-outline-secondary btn-back">
              &larr; Volver al Índice de Ejercicios
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function generarAleatorio(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
}
function ejecutarEjercicio() {
        let salida;
        let numero1;
        let A = [];
        let B = [];
        let C = [];
        let n = parseInt(prompt("Ingrese el tamaño del arreglo"));
        for(let i =0; i < n; i++){
            A[i] = generarAleatorio(1,100);
            B[i] = generarAleatorio(1,100);
            C[i] = A[i] + B[i];
        }
        salida = "Arreglo A:  \n"+ A +"\n";
        salida += "Arreglo B:  \n"+ B +"\n";
        
        for(let i = 0; i < n; i++){
            salida +=  A[i] + " + " + B[i] + " = " + C[i] + "\n";
        }
         salida += "La suma del arreglo A y B es:  \n"+ C +"\n";
        document.getElementById("resultado").innerText = salida;
      }
    </script>
  </body>
</html>
