<html lang="en">
  <head>
    <meta charset="UTF-8" />

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"

      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"

  <body>
    <div class="container">
      <div class="card border-success">
        <div class="card-header">
          <h1 class="card-title text-info text-center">mi primer javaScript</h1>
        </div>
        <div class="card-body text-primary text-center">
          <script type="text/javascript">
            document.write("<b>Ejemplo de prompt con validación</b>");
            let suma = 0;
            let limite; // Bucle de validación
            while (true) {
              limite = parseInt(
                prompt(
                  "Ingresa el número límite (debe ser un número mayor a 1)",
                ),
              );
              limite = Number(limite);
              if (!isNaN(limite) && limite > 1) {
                break; // Si es válido, salimos del bucle while
              } else {
                alert(
                  "Error: Por favor ingresa un número válido y que sea mayor a 1.",
                );
              }
            }
            for (let i = 0; i <= limite; i++) {
              document.write("<br>I =" + i);
              suma += i;
            }

            document.write(
              "<br><b><i>El resultado de la suma de 0 hasta " +
                limite +
                " es: " +
                suma +
                "</i></b>",
            );
          </script>
        </div>
        <div class="card-footer text-center text-primary">
          Obtnner la sumas de los primeros 100 numeros
        </div>
      </div>
      <div class="contenedor">
            <script type="text/javascript">
            limite = 100;

            let vf = parseInt(
              prompt("Ingresa el número límite (debe ser un número mayor a 1)"),
            );
            if (isNaN(vf)) {
              alert("No es un numeor válido.");
            } else if (vf <= 1) {
              alert(
                "Error: Por favor ingresa un número válido y que sea mayor a 1. Se usará el límite por defecto de 100.",
              );
            } else {
              document.write(
                "<b>Obtener los numeros pares de 0 hasta " + vf + "</b>",
              );
              for (let i = 0; i <= vf; i++) {
                if (i % 2 === 0) {
                  document.write("<br>I =" + i);
                }
              }
            }
          </script>
      </div>
    </div>
  </body>
