<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio 7 : Ordenamiento de un arreglo </title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
      }
      .exercise-container {
        margin-top: 50px;
        margin-bottom: 50px;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .btn-back {
        margin-top: 20px;
      }
      #resultado {
        background-color: #e9ecef;
        padding: 15px;
        border-radius: 5px;
        min-height: 50px;
        margin-top: 20px;
        white-space: pre-wrap; 
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 exercise-container">
          <h2 class="text-center mb-4 text-primary">Ordenamiento de un arreglo</h2>

          <div class="card mb-4">
            <div class="card-body">
              <h5 class="card-title">Ejercicio 7:</h5>
              <p class="card-text">
                Dado una secuencia de números leídos y
                almacenados en un arreglo A, mostrar dichos números en orden.
              </p>
            </div>
          </div>

          <div class="d-grid gap-2">
            <button onclick="ejecutarEjercicio()" class="btn btn-dark">
              Ejecutar Programa
            </button>
          </div>

          <div id="resultado">Los resultados aparecerán aquí</div>

          <hr />

          <div class="text-center">
            <a href="indext.html" class="btn btn-outline-secondary btn-back">
              &larr; Volver al Índice de Ejercicios
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
function MergeSort(A) {
    let n = A.length;
    if (n <= 1) return A;

    // 1. Asegurar que medio sea un entero
    let medio = Math.floor(n / 2); 
    
    // 2. No saltarse el elemento en la posición 'medio'
    let izquierda = MergeSort(A.slice(0, medio));
    let derecha = MergeSort(A.slice(medio)); 

    return Merge(izquierda, derecha);
}

function Merge(izq, der) {
    let resultado = [];
    let i = 0;
    let j = 0;

    while (i < izq.length && j < der.length) {
        if (izq[i] < der[j]) {
            resultado.push(izq[i]);
            i++;
        } else {
            resultado.push(der[j]);
            j++;
        }
    }
    return resultado.concat(izq.slice(i)).concat(der.slice(j));
}
function ejecutarEjercicio() {
        let salida;
        let numero1;
        let A = [];
        do {
          let entrada = prompt( "Ingrese un número para agregar o espacio para parar");
          if (entrada === null || entrada.trim() === "") break;
          numero1 = parseInt(entrada);
          if (!isNaN(numero1) && numero1 >= 0) {
            A.push(numero1);
          }
        } while (true);
        salida = "Arreglo A:  \n"+ A +"\n";
        A = MergeSort(A);
        salida += "Arreglo A ordenado:  \n"+ A +"\n";
        document.getElementById("resultado").innerText = salida;
      }
    </script>
  </body>
</html>
